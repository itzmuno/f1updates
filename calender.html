<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Formula 1 | 2026 Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Titillium+Web:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0b0b12; font-family: 'Inter', 'Titillium Web', sans-serif; color: white; }
        :root { --f1-red: #e10600; --f1-black: #0a0a0f; --f1-dark-card: #111116; --f1-border: #22222c; }
        .site-wrapper { max-width: 1440px; margin: 0 auto; background: var(--f1-black); min-height: 100vh; }
        .header { padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; background: #08080c; border-bottom: 3px solid var(--f1-red); sticky; top: 0; z-index: 100; }
        .logo-area { display: flex; align-items: baseline; gap: 12px; }
        .f1-badge { font-size: 2rem; font-weight: 900; color: white; }
        .f1-badge span { font-size: 1rem; font-weight: 500; color: var(--f1-red); margin-left: 2px; }
        .tagline { font-size: 0.7rem; font-weight: 500; color: #9e9eae; border-left: 2px solid var(--f1-red); padding-left: 12px; }
        .nav-links { display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { color: white; text-decoration: none; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; transition: 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--f1-red); border-bottom: 2px solid var(--f1-red); }
        .btn-outline { border: 1.5px solid var(--f1-red); padding: 0.4rem 1.2rem; border-radius: 4px; background: transparent; color: white; cursor: pointer; }
        .hero { background: linear-gradient(135deg, #0e0e18, #08080c); padding: 2rem; text-align: center; border-bottom: 2px solid var(--f1-red); }
        .hero h1 { font-size: 2.5rem; font-weight: 800; }
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; text-align: center; }
        .footer { background: #06060a; padding: 1.5rem; text-align: center; font-size: 0.7rem; }
        @media (max-width: 800px) { .header { flex-direction: column; gap: 1rem; } }
    </style>
</head>
<body>
<div class="site-wrapper">
    <header class="header">
        <div class="logo-area"><div class="f1-badge">FORMULA 1<span>®</span></div><div class="tagline">OFFICIAL 2026 SEASON</div></div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="drivers.html">DRIVERS</a>
            <a href="teams.html">TEAMS</a>
            <a href="calendar.html" class="active">CALENDAR</a>
            <a href="predict.html">F1 PREDICT</a>
            <a href="watch.html" class="btn-outline">WATCH F1</a>
        </div>
    </header>
    <div class="hero"><h1><i class="fas fa-calendar-alt"></i> 2026 RACE CALENDAR</h1></div>
    <div class="container">
        <p style="color: #9e9eae;">Coming soon - Full 2026 race schedule.</p>
    </div>
    <footer class="footer"><p>© 2026 Formula One World Championship Limited.</p></footer>
</div>
</body>
</html>
