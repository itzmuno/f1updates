<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Formula 1 | Team News</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Titillium+Web:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0b0b12; font-family: 'Inter', 'Titillium Web', sans-serif; color: #ffffff; line-height: 1.4; }
        :root { --f1-red: #e10600; --f1-black: #0a0a0f; --f1-dark-card: #111116; --f1-border: #22222c; }
        .site-wrapper { max-width: 1440px; margin: 0 auto; background: var(--f1-black); min-height: 100vh; }
        .header { padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; background: #08080c; border-bottom: 3px solid var(--f1-red); position: sticky; top: 0; z-index: 100; }
        .logo-area { display: flex; align-items: baseline; gap: 12px; }
        .f1-badge { font-size: 2rem; font-weight: 900; color: white; }
        .f1-badge span { font-size: 1rem; font-weight: 500; color: var(--f1-red); margin-left: 2px; }
        .tagline { font-size: 0.7rem; font-weight: 500; color: #9e9eae; border-left: 2px solid var(--f1-red); padding-left: 12px; }
        .nav-links { display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { color: white; text-decoration: none; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; transition: 0.2s; }
        .nav-links a:hover { color: var(--f1-red); }
        .btn-outline { border: 1.5px solid var(--f1-red); padding: 0.4rem 1.2rem; border-radius: 4px; background: transparent; color: white; cursor: pointer; }
        .detail-container { max-width: 1000px; margin: 2rem auto; padding: 0 1.5rem; }
        .back-btn { background: var(--f1-dark-card); border: 1px solid var(--f1-border); padding: 0.5rem 1rem; border-radius: 30px; cursor: pointer; display: inline-block; margin-bottom: 1.5rem; transition: 0.2s; }
        .back-btn:hover { border-color: var(--f1-red); color: var(--f1-red); }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; margin-bottom: 1.5rem; border-radius: 20px; overflow: hidden; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .detail-title { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
        .detail-meta { color: var(--f1-red); margin-bottom: 1.5rem; display: flex; gap: 1.5rem; }
        .detail-content { line-height: 1.7; color: #ccc; font-size: 1rem; }
        .detail-content p { margin-bottom: 1rem; }
        .footer { background: #06060a; padding: 1.5rem; text-align: center; font-size: 0.7rem; border-top: 1px solid rgba(225,6,0,0.3); margin-top: 2rem; }
        @media (max-width: 800px) { .header { flex-direction: column; gap: 1rem; } .detail-title { font-size: 1.5rem; } }
    </style>
</head>
<body>
<div class="site-wrapper">
    <header class="header">
        <div class="logo-area"><div class="f1-badge">FORMULA 1<span>®</span></div><div class="tagline">OFFICIAL 2026 SEASON</div></div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="drivers.html">DRIVERS</a>
            <a href="teams.html">TEAMS</a>
            <a href="calendar.html">CALENDAR</a>
            <a href="predict.html">F1 PREDICT</a>
            <a href="watch.html" class="btn-outline">WATCH F1</a>
        </div>
    </header>

    <div class="detail-container" id="detailContainer">
        <div class="back-btn" onclick="window.location.href='teams.html'"><i class="fas fa-arrow-left"></i> Back to Teams</div>
        <div id="newsContent">
            <!-- Content loaded dynamically -->
        </div>
    </div>

    <footer class="footer">
        <div class="social-icons"><a href="#"><i class="fab fa-twitter"></i></a><a href="#"><i class="fab fa-instagram"></i></a><a href="#"><i class="fab fa-youtube"></i></a></div>
        <p>© 2026 Formula One World Championship Limited.</p>
    </footer>
</div>

<script>
    // The same news data from teams.html (must match)
    const teamNews = [
        { id: 1, team: "Mercedes", title: "Antonelli extends championship lead with Miami Sprint victory", fullContent: "Kimi Antonelli continued his incredible rookie season by dominating the Miami Sprint Shootout, setting the fastest time in every segment. The 19-year-old Italian will start from pole position for Saturday's Sprint Race. 'The car is flying, and I'm loving every moment,' Antonelli said. 'Miami is electric.' With 4 consecutive pole positions, Antonelli now leads the championship with 68 points, followed by George Russell (46 points).", date: "May 2, 2026", videoId: "bYFqGzC2P0A" },
        { id: 2, team: "Ferrari", title: "Major upgrade package shows promise in Miami", fullContent: "Ferrari has arrived in Miami with a significant upgrade package aimed at addressing the car's aerodynamic deficiencies. The new floor and rear wing are designed to increase downforce in medium-speed corners. 'We believe this is a step forward,' said team principal Fred Vasseur. 'The data from Friday practice looks promising.' Charles Leclerc and Lewis Hamilton both advanced to Q3, marking Ferrari's best qualifying result of the season.", date: "May 1, 2026", videoId: "RrXqR8ZW4M0" },
        { id: 3, team: "McLaren", title: "Norris takes Sprint pole, signals McLaren's return to front", fullContent: "Lando Norris achieved McLaren's first pole position since 2024 by beating Kimi Antonelli by 0.07 seconds in the Miami Sprint Shootout. The revamped MCL40 features a completely new floor and front wing. 'We have turned a corner,' said Norris. 'This car can win races.' McLaren has scored points in every race this season, with Norris finishing on the podium in Australia.", date: "May 1, 2026", videoId: "j5YvS5DAiDQ" },
        { id: 4, team: "Red Bull", title: "Verstappen admits 'we are not fast enough'", fullContent: "Max Verstappen was frank about Red Bull's struggles after qualifying only 7th for the Miami Sprint. 'We are not fast enough, plain and simple,' said the three-time world champion. 'The Mercedes and McLaren are ahead by a big margin. We have a lot of work to do.' Red Bull introduced a B-spec car in Miami, but early signs suggest the upgrade package has not closed the gap.", date: "April 30, 2026", videoId: "XsR_2mX7wGg" },
        { id: 5, team: "Haas", title: "American team sits best-ever 5th in constructors'", fullContent: "Haas is enjoying its best start to a season, sitting 5th in the constructors' championship after three rounds. Esteban Ocon and rookie Oliver Bearman have both scored points, and the team's upgrade program is delivering. 'We are exceeding expectations,' said team principal Ayao Komatsu. 'The aim now is to keep this momentum and fight for top-five finishes.'", date: "April 29, 2026", videoId: "QlIDrGkM7M4" },
        { id: 6, team: "Williams", title: "Albon and Sainz bring points to Grove", fullContent: "Williams finally got off the mark in 2026 as Alex Albon finished 9th in the Miami Sprint, earning the team's first two points. Carlos Sainz was 11th, just 0.2 seconds away from points. 'We have a solid baseline now,' said Albon. 'The upgrades are working, and we can build from here.' The team is optimistic ahead of the main Grand Prix.", date: "May 1, 2026", videoId: "qf0A_bnvZnM" },
        { id: 7, team: "Alpine", title: "Gasly and Colapinto show flashes of speed", fullContent: "Alpine showed improved pace in Miami, with Pierre Gasly and Franco Colapinto both advancing to Q2. The young Argentinian Colapinto even outqualified his more experienced teammate. 'We are getting there,' said Gasly. 'The car is responding to our updates. It's not yet where we want, but the direction is positive.'", date: "April 30, 2026", videoId: "dFw0G1FQb_Q" },
        { id: 8, team: "Cadillac", title: "Historic home race for American team", fullContent: "Cadillac achieved its best qualifying result since joining F1, with Sergio Perez advancing to Q3 in the Miami Sprint Shootout. The Mexican driver will start 9th for Saturday's Sprint Race. 'The crowd was unbelievable,' Perez said. 'Every lap they cheered louder. This is for every American fan.' Teammate Valtteri Bottas also had his best qualifying of the season, starting P13.", date: "May 1, 2026", videoId: "yv_3s7yMBSo" }
    ];

    function getNewsId() {
        const params = new URLSearchParams(window.location.search);
        return parseInt(params.get('id'));
    }

    function renderNewsDetail() {
        const id = getNewsId();
        const news = teamNews.find(n => n.id === id);
        if (!news) {
            document.getElementById('newsContent').innerHTML = '<p style="color:red;">News article not found.</p>';
            return;
        }

        const videoUrl = `https://www.youtube.com/embed/${news.videoId}?autoplay=0&rel=0`;

        document.getElementById('newsContent').innerHTML = `
            <div class="video-wrapper">
                <iframe src="${videoUrl}" title="${news.title}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <h1 class="detail-title">${news.title}</h1>
            <div class="detail-meta">
                <span><i class="far fa-calendar-alt"></i> ${news.date}</span>
                <span><i class="fas fa-flag-checkered"></i> ${news.team}</span>
            </div>
            <div class="detail-content">
                <p>${news.fullContent}</p>
            </div>
        `;
    }

    document.addEventListener('DOMContentLoaded', renderNewsDetail);
</script>
</body>
</html>
