<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Formula 1 | 2026 Constructors & Team News</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Titillium+Web:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0b0b12; font-family: 'Inter', 'Titillium Web', sans-serif; color: #ffffff; line-height: 1.4; }
        :root { --f1-red: #e10600; --f1-black: #0a0a0f; --f1-dark-card: #111116; --f1-border: #22222c; --f1-gray: #9e9eae; }
        .site-wrapper { max-width: 1440px; margin: 0 auto; background: var(--f1-black); min-height: 100vh; }
        .header { padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; background: #08080c; border-bottom: 3px solid var(--f1-red); position: sticky; top: 0; z-index: 100; }
        .logo-area { display: flex; align-items: baseline; gap: 12px; }
        .f1-badge { font-size: 2rem; font-weight: 900; color: white; }
        .f1-badge span { font-size: 1rem; font-weight: 500; color: var(--f1-red); margin-left: 2px; }
        .tagline { font-size: 0.7rem; font-weight: 500; color: var(--f1-gray); border-left: 2px solid var(--f1-red); padding-left: 12px; }
        .nav-links { display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { color: white; text-decoration: none; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; transition: 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--f1-red); border-bottom: 2px solid var(--f1-red); }
        .btn-outline { border: 1.5px solid var(--f1-red); padding: 0.4rem 1.2rem; border-radius: 4px; background: transparent; color: white; cursor: pointer; }
        .hero { background: linear-gradient(135deg, #0e0e18, #08080c); padding: 2rem; text-align: center; border-bottom: 2px solid var(--f1-red); }
        .hero h1 { font-size: 2.5rem; font-weight: 800; }
        .container { max-width: 1280px; margin: 0 auto; padding: 2rem; }
        .section-header { font-size: 1.8rem; font-weight: 700; margin-bottom: 1.5rem; border-left: 4px solid var(--f1-red); padding-left: 1rem; }
        .constructors-table { width: 100%; border-collapse: collapse; background: var(--f1-dark-card); border-radius: 16px; overflow: hidden; margin-bottom: 2rem; }
        .constructors-table th { background: var(--f1-red); padding: 1rem; text-align: left; }
        .constructors-table td { padding: 1rem; border-bottom: 1px solid var(--f1-border); }
        .team-points { background: var(--f1-red); padding: 4px 12px; border-radius: 20px; display: inline-block; font-weight: 700; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; margin-top: 1rem; }
        .news-card { background: var(--f1-dark-card); border: 1px solid var(--f1-border); border-radius: 16px; overflow: hidden; transition: 0.2s; }
        .news-card:hover { border-color: var(--f1-red); transform: translateY(-4px); }
        .news-header { background: linear-gradient(135deg, #1a1a28, #0f0f18); padding: 1rem; border-bottom: 1px solid var(--f1-border); }
        .news-header h3 { color: var(--f1-red); font-size: 1.1rem; }
        .news-body { padding: 1rem; }
        .news-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
        .news-summary { color: var(--f1-gray); font-size: 0.85rem; line-height: 1.4; }
        .news-date { margin-top: 0.5rem; font-size: 0.7rem; color: var(--f1-red); }
        .footer { background: #06060a; padding: 1.5rem; text-align: center; font-size: 0.7rem; border-top: 1px solid rgba(225,6,0,0.3); }
        .social-icons { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 0.8rem; }
        @media (max-width: 800px) { .header { flex-direction: column; gap: 1rem; } .news-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="site-wrapper">
    <header class="header">
        <div class="logo-area"><div class="f1-badge">FORMULA 1<span>®</span></div><div class="tagline">OFFICIAL 2026 SEASON</div></div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="drivers.html">DRIVERS</a>
            <a href="teams.html" class="active">TEAMS</a>
            <a href="calendar.html">CALENDAR</a>
            <a href="predict.html">F1 PREDICT</a>
            <a href="watch.html" class="btn-outline">WATCH F1</a>
        </div>
    </header>
    <div class="hero"><h1><i class="fas fa-building"></i> 2026 CONSTRUCTOR STANDINGS & TEAM NEWS</h1></div>
    <div class="container">
        <div class="section-header"><i class="fas fa-chart-simple"></i> CONSTRUCTORS CHAMPIONSHIP</div>
        <table class="constructors-table">
            <thead><tr><th>POS</th><th>TEAM</th><th>ENGINE</th><th>PTS</th><th>WINS</th></tr></thead>
            <tbody id="constructorsTable"></tbody>
        追赶
        <div class="section-header"><i class="fas fa-newspaper"></i> TEAM NEWS & UPDATES</div>
        <div class="news-grid" id="newsGrid"></div>
    </div>
    <footer class="footer"><div class="social-icons"><a href="#"><i class="fab fa-twitter"></i></a><a href="#"><i class="fab fa-instagram"></i></a><a href="#"><i class="fab fa-youtube"></i></a></div><p>© 2026 Formula One World Championship Limited.</p></footer>
</div>
<script>
    const constructors = [
        { pos: 1, name: "Mercedes", engine: "Mercedes", pts: 98, wins: 3 },
        { pos: 2, name: "Ferrari", engine: "Ferrari", pts: 52, wins: 0 },
        { pos: 3, name: "McLaren", engine: "Mercedes", pts: 45, wins: 0 },
        { pos: 4, name: "Red Bull Racing", engine: "Honda RBPT", pts: 28, wins: 0 },
        { pos: 5, name: "Haas", engine: "Ferrari", pts: 12, wins: 0 },
        { pos: 6, name: "Racing Bulls", engine: "Honda RBPT", pts: 8, wins: 0 },
        { pos: 7, name: "Alpine", engine: "Renault", pts: 6, wins: 0 },
        { pos: 8, name: "Williams", engine: "Mercedes", pts: 4, wins: 0 },
        { pos: 9, name: "Audi", engine: "Audi", pts: 2, wins: 0 },
        { pos: 10, name: "Aston Martin", engine: "Mercedes", pts: 0, wins: 0 },
        { pos: 11, name: "Cadillac", engine: "Ferrari", pts: 0, wins: 0 }
    ];
    const teamNews = [
        { team: "Mercedes", title: "Antonelli's Dream Start", summary: "Kimi Antonelli wins two of first three races, leads Drivers' Championship.", date: "April 8, 2026" },
        { team: "Ferrari", title: "Struggles Continue", summary: "Ferrari fails to secure podium in last two races, upgrades planned for Miami.", date: "April 5, 2026" },
        { team: "McLaren", title: "‘B Teams Risk Distorting Championship’", summary: "Zak Brown warns FIA about team alliances affecting sporting integrity.", date: "April 6, 2026" },
        { team: "Red Bull", title: "Verstappen: 'We're not where we want to be'", summary: "Zero wins after three races, team focuses on understanding car issues.", date: "April 4, 2026" },
        { team: "Cadillac", title: "Historic Home Debut in Miami", summary: "Perez and Bottas ready for first American home race.", date: "April 3, 2026" },
        { team: "Haas", title: "Bearman Impresses in Rookie Season", summary: "Oliver Bearman scores first points in Australian GP.", date: "April 2, 2026" },
        { team: "Alpine", title: "Colapinto Brings Argentinian Passion", summary: "Franco Colapinto shines in qualifying, team targets midfield.", date: "April 1, 2026" }
    ];
    function renderConstructors() {
        const tbody = document.getElementById('constructorsTable');
        if (tbody) tbody.innerHTML = constructors.map(c => `<table><td style="font-weight:700">${c.pos}</td><td><strong>${c.name}</strong></td><td>${c.engine}</td><td><span class="team-points">${c.pts} PTS</span></td><td>${c.wins}</td>`).join('');
    }
    function renderNews() {
        const container = document.getElementById('newsGrid');
        if (container) container.innerHTML = teamNews.map(n => `
            <div class="news-card">
                <div class="news-header"><h3><i class="fas fa-flag-checkered"></i> ${n.team}</h3></div>
                <div class="news-body"><div class="news-title">${n.title}</div><div class="news-summary">${n.summary}</div><div class="news-date"><i class="far fa-calendar-alt"></i> ${n.date}</div></div>
            </div>
        `).join('');
    }
    document.addEventListener('DOMContentLoaded', () => { renderConstructors(); renderNews(); });
</script>
</body>
</html>
