<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Formula 1 | 2026 Drivers</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Titillium+Web:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0b0b12; font-family: 'Inter', 'Titillium Web', sans-serif; color: #ffffff; line-height: 1.4; overflow-x: hidden; }
        :root { --f1-red: #e10600; --f1-black: #0a0a0f; --f1-dark-card: #111116; --f1-border: #22222c; --f1-gray: #9e9eae; }
        .site-wrapper { max-width: 1440px; margin: 0 auto; background: var(--f1-black); min-height: 100vh; }
        .header { padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; background: #08080c; border-bottom: 3px solid var(--f1-red); position: sticky; top: 0; z-index: 100; }
        .logo-area { display: flex; align-items: baseline; gap: 12px; }
        .f1-badge { font-size: 2rem; font-weight: 900; letter-spacing: -1.5px; color: white; }
        .f1-badge span { font-size: 1rem; font-weight: 500; color: var(--f1-red); margin-left: 2px; }
        .tagline { font-size: 0.7rem; font-weight: 500; color: var(--f1-gray); letter-spacing: 1px; border-left: 2px solid var(--f1-red); padding-left: 12px; }
        .nav-links { display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { color: #ffffff; text-decoration: none; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--f1-red); border-bottom: 2px solid var(--f1-red); }
        .btn-outline { border: 1.5px solid var(--f1-red); padding: 0.4rem 1.2rem; border-radius: 4px; background: transparent; color: white; font-weight: 700; font-size: 0.8rem; transition: all 0.2s; cursor: pointer; }
        .btn-outline:hover { background: var(--f1-red); color: white; }
        .hero { background: linear-gradient(135deg, #0e0e18, #08080c); padding: 2rem; text-align: center; border-bottom: 2px solid var(--f1-red); }
        .hero h1 { font-size: 2.5rem; font-weight: 800; }
        .hero p { color: var(--f1-gray); margin-top: 0.5rem; }
        .container { max-width: 1280px; margin: 0 auto; padding: 2rem; }
        .drivers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.8rem; }
        .driver-card { background: var(--f1-dark-card); border-radius: 16px; border: 1px solid var(--f1-border); overflow: hidden; transition: 0.25s; }
        .driver-card:hover { border-color: var(--f1-red); transform: translateY(-5px); }
        .driver-img { width: 100%; height: 260px; object-fit: cover; object-position: top 25% center; background: #0c0c10; }
        .driver-info { padding: 1.2rem; text-align: center; }
        .driver-name { font-size: 1.3rem; font-weight: 800; }
        .driver-team { color: var(--f1-red); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; margin: 0.3rem 0; }
        .driver-stats { display: flex; justify-content: center; gap: 1rem; margin-top: 0.5rem; color: var(--f1-gray); font-size: 0.8rem; }
        .footer { background: #06060a; padding: 1.5rem; text-align: center; font-size: 0.7rem; border-top: 1px solid rgba(225,6,0,0.3); }
        .social-icons { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 0.8rem; }
        @media (max-width: 800px) { .header { flex-direction: column; gap: 1rem; } .drivers-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="site-wrapper">
    <header class="header">
        <div class="logo-area"><div class="f1-badge">FORMULA 1<span>®</span></div><div class="tagline">OFFICIAL 2026 SEASON</div></div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="drivers.html" class="active">DRIVERS</a>
            <a href="teams.html">TEAMS</a>
            <a href="calendar.html">CALENDAR</a>
            <a href="predict.html">F1 PREDICT</a>
            <a href="watch.html" class="btn-outline">WATCH F1</a>
        </div>
    </header>

    <div class="hero">
        <h1><i class="fas fa-helmet-safety"></i> 2026 DRIVER LINE-UP</h1>
        <p>22 drivers · 11 teams · The fastest grid in history</p>
    </div>

    <div class="container">
        <div class="drivers-grid" id="driversGrid"></div>
    </div>

    <footer class="footer">
        <div class="social-icons">
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
        <p>© 2026 Formula One World Championship Limited.</p>
    </footer>
</div>

<script>
    // Complete 2026 F1 Drivers Dataset - 22 drivers with official portrait images
    const drivers = [
        // McLaren
        { name: "Lando Norris", team: "McLaren", num: 1, flag: "🇬🇧", wins2026: 0, podiums2026: 1, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/norris.jpg" },
        { name: "Oscar Piastri", team: "McLaren", num: 81, flag: "🇦🇺", wins2026: 0, podiums2026: 0, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/piastri.jpg" },
        // Ferrari
        { name: "Charles Leclerc", team: "Ferrari", num: 16, flag: "🇲🇨", wins2026: 0, podiums2026: 1, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/leclerc.jpg" },
        { name: "Lewis Hamilton", team: "Ferrari", num: 44, flag: "🇬🇧", wins2026: 0, podiums2026: 1, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/hamilton.jpg" },
        // Red Bull Racing
        { name: "Max Verstappen", team: "Red Bull Racing", num: 1, flag: "🇳🇱", wins2026: 0, podiums2026: 0, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/verstappen.jpg" },
        { name: "Sergio Perez", team: "Red Bull Racing", num: 11, flag: "🇲🇽", wins2026: 0, podiums2026: 0, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/perez.jpg" },
        // Mercedes
        { name: "George Russell", team: "Mercedes", num: 63, flag: "🇬🇧", wins2026: 1, podiums2026: 2, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/russell.jpg" },
        { name: "Kimi Antonelli", team: "Mercedes", num: 12, flag: "🇮🇹", wins2026: 2, podiums2026: 2, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/antonelli.jpg" },
        // Aston Martin
        { name: "Fernando Alonso", team: "Aston Martin", num: 14, flag: "🇪🇸", wins2026: 0, podiums2026: 0, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/alonso.jpg" },
        { name: "Lance Stroll", team: "Aston Martin", num: 18, flag: "🇨🇦", wins2026: 0, podiums2026: 0, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/stroll.jpg" },
        // Alpine
        { name: "Pierre Gasly", team: "Alpine", num: 10, flag: "🇫🇷", wins2026: 0, podiums2026: 0, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/gasly.jpg" },
        { name: "Esteban Ocon", team: "Alpine", num: 31, flag: "🇫🇷", wins2026: 0, podiums2026: 0, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/ocon.jpg" },
        // Haas
        { name: "Nico Hulkenberg", team: "Haas", num: 27, flag: "🇩🇪", wins2026: 0, podiums2026: 0, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/hulkenberg.jpg" },
        { name: "Kevin Magnussen", team: "Haas", num: 20, flag: "🇩🇰", wins2026: 0, podiums2026: 0, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/magnussen.jpg" },
        // Kick Sauber (Audi)
        { name: "Valtteri Bottas", team: "Kick Sauber", num: 77, flag: "🇫🇮", wins2026: 0, podiums2026: 0, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/bottas.jpg" },
        // Visa Cash App RB (Racing Bulls)
        { name: "Yuki Tsunoda", team: "Racing Bulls", num: 22, flag: "🇯🇵", wins2026: 0, podiums2026: 0, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/tsunoda.jpg" },
        // Williams
        { name: "Alex Albon", team: "Williams", num: 23, flag: "🇹🇭", wins2026: 0, podiums2026: 0, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/albon.jpg" },
        // Cadillac
        { name: "Valtteri Bottas", team: "Cadillac", num: 77, flag: "🇫🇮", wins2026: 0, podiums2026: 0, img: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/bottas.jpg" }
    ];

    function renderDrivers() {
        const container = document.getElementById('driversGrid');
        if (container) {
            container.innerHTML = drivers.map(driver => `
                <div class="driver-card">
                    <img class="driver-img" src="${driver.img}" alt="${driver.name}" onerror="this.src='https://placehold.co/400x260/1a1a22/e10600?text=${driver.name.split(' ')[0]}'">
                    <div class="driver-info">
                        <div class="driver-name">${driver.name}</div>
                        <div class="driver-team">${driver.team} · #${driver.num}</div>
                        <div class="driver-stats">
                            <span><i class="fas fa-trophy"></i> ${driver.wins2026} wins</span>
                            <span><i class="fas fa-podium"></i> ${driver.podiums2026} podiums</span>
                            <span>${driver.flag}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    }

    document.addEventListener('DOMContentLoaded', renderDrivers);
</script>
</body>
</html>
