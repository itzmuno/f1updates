<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Formula 1 | F1 Predict 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Titillium+Web:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0b0b12; font-family: 'Inter', 'Titillium Web', sans-serif; color: #fff; }
        :root { --f1-red: #e10600; --f1-black: #0a0a0f; --f1-dark-card: #111116; --f1-border: #22222c; }
        .site-wrapper { max-width: 1440px; margin: 0 auto; background: var(--f1-black); min-height: 100vh; }
        .header { padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; background: #08080c; border-bottom: 3px solid var(--f1-red); position: sticky; top: 0; z-index: 100; }
        .logo-area { display: flex; align-items: baseline; gap: 12px; }
        .f1-badge { font-size: 2rem; font-weight: 900; letter-spacing: -1.5px; color: white; }
        .f1-badge span { font-size: 1rem; font-weight: 500; color: var(--f1-red); margin-left: 2px; }
        .tagline { font-size: 0.7rem; font-weight: 500; color: #9e9eae; letter-spacing: 1px; border-left: 2px solid var(--f1-red); padding-left: 12px; }
        .nav-links { display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { color: #fff; text-decoration: none; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--f1-red); border-bottom: 2px solid var(--f1-red); }
        .btn-outline { border: 1.5px solid var(--f1-red); padding: 0.4rem 1.2rem; border-radius: 4px; background: transparent; color: white; font-weight: 700; font-size: 0.8rem; cursor: pointer; }
        .hero { background: linear-gradient(135deg, #0e0e18, #08080c); padding: 2rem; text-align: center; border-bottom: 2px solid var(--f1-red); }
        .hero h1 { font-size: 2.5rem; font-weight: 800; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .predict-card { background: var(--f1-dark-card); border-radius: 24px; border: 1px solid var(--f1-border); overflow: hidden; margin-bottom: 2rem; }
        .race-header { background: linear-gradient(135deg, #1a1a28, #0f0f18); padding: 1rem; display: flex; justify-content: space-between; flex-wrap: wrap; border-bottom: 1px solid var(--f1-border); }
        .predict-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; padding: 1.5rem; }
        .predict-slot { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 1rem; }
        .predict-slot select { width: 100%; background: #1a1a22; border: 1px solid var(--f1-border); border-radius: 12px; padding: 0.7rem; color: white; cursor: pointer; }
        .submit-btn { background: var(--f1-red); border: none; padding: 0.8rem; border-radius: 12px; font-weight: 700; cursor: pointer; margin: 0 1.5rem 1.5rem; width: calc(100% - 3rem); }
        .history-card { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 1rem; margin-top: 1.5rem; }
        .history-list li { padding: 0.8rem; border-bottom: 1px solid var(--f1-border); display: flex; justify-content: space-between; flex-wrap: wrap; }
        .footer { background: #06060a; padding: 1.5rem; text-align: center; font-size: 0.7rem; border-top: 1px solid rgba(225,6,0,0.3); }
        @media (max-width: 800px) { .header { flex-direction: column; gap: 1rem; } .predict-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="site-wrapper">
    <header class="header">
        <div class="logo-area"><div class="f1-badge">FORMULA 1<span>®</span></div><div class="tagline">OFFICIAL 2026 SEASON</div></div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="drivers.html">DRIVERS</a>
            <a href="teams.html">TEAMS</a>
            <a href="calendar.html">CALENDAR</a>
            <a href="predict.html" class="active">F1 PREDICT</a>
            <a href="watch.html" class="btn-outline">WATCH F1</a>
        </div>
    </header>
    <div class="hero"><h1><i class="fas fa-chart-line"></i> F1 PREDICT</h1><p>Predict race winner, podium & fastest lap for Miami GP</p></div>
    <div class="container">
        <div class="predict-card">
            <div class="race-header"><div><span style="font-size:1.5rem;">🇺🇸</span> <strong>Miami Grand Prix</strong></div><div>May 1-3, 2026</div></div>
            <div class="predict-grid">
                <div class="predict-slot"><h3>🏆 WINNER</h3><select id="winnerSelect"></select></div>
                <div class="predict-slot"><h3>🥈 2ND</h3><select id="secondSelect"></select></div>
                <div class="predict-slot"><h3>🥉 3RD</h3><select id="thirdSelect"></select></div>
                <div class="predict-slot"><h3>⚡ FASTEST LAP</h3><select id="fastestLapSelect"></select></div>
            </div>
            <button class="submit-btn" id="submitBtn">SUBMIT PREDICTION</button>
            <div id="message" style="text-align:center; margin-bottom:1rem;"></div>
        </div>
        <div class="history-card"><h3>📋 YOUR PREDICTIONS</h3><ul class="history-list" id="predictionList"></ul></div>
    </div>
    <footer class="footer"><p>© 2026 Formula One World Championship Limited.</p></footer>
</div>
<script>
    const drivers = ["Max Verstappen","Sergio Perez","Lewis Hamilton","Charles Leclerc","Lando Norris","Oscar Piastri","George Russell","Kimi Antonelli","Fernando Alonso","Lance Stroll","Pierre Gasly","Esteban Ocon","Nico Hulkenberg","Kevin Magnussen","Yuki Tsunoda","Daniel Ricciardo","Alex Albon","Logan Sargeant","Valtteri Bottas","Oliver Bearman"];
    const flags = { "Max Verstappen":"🇳🇱","Lewis Hamilton":"🇬🇧","Charles Leclerc":"🇲🇨","Lando Norris":"🇬🇧","George Russell":"🇬🇧","Kimi Antonelli":"🇮🇹","Fernando Alonso":"🇪🇸","Sergio Perez":"🇲🇽","Oscar Piastri":"🇦🇺","Lance Stroll":"🇨🇦","Pierre Gasly":"🇫🇷","Esteban Ocon":"🇫🇷","Nico Hulkenberg":"🇩🇪","Kevin Magnussen":"🇩🇰","Yuki Tsunoda":"🇯🇵","Daniel Ricciardo":"🇦🇺","Alex Albon":"🇹🇭","Logan Sargeant":"🇺🇸","Valtteri Bottas":"🇫🇮","Oliver Bearman":"🇬🇧"};
    
    function populateSelects() {
        const opts = drivers.map(d => `<option value="${d}">${flags[d] || '🏁'} ${d}</option>`).join('');
        ['winnerSelect', 'secondSelect', 'thirdSelect', 'fastestLapSelect'].forEach(id => document.getElementById(id).innerHTML = opts);
    }
    
    let predictions = JSON.parse(localStorage.getItem('f1Predictions')) || [];
    function renderHistory() {
        const container = document.getElementById('predictionList');
        if (container) {
            if (predictions.length === 0) { container.innerHTML = '<li style="text-align:center">No predictions yet</li>'; return; }
            container.innerHTML = predictions.map(p => `<li><span><strong>${p.race}</strong><br>${p.date}</span><span>🏆 ${p.winner}<br>🥈 ${p.second}<br>🥉 ${p.third}<br>⚡ ${p.fastestLap}</span></li>`).join('');
        }
    }
    
    document.getElementById('submitBtn').addEventListener('click', () => {
        const w = document.getElementById('winnerSelect').value, s = document.getElementById('secondSelect').value, t = document.getElementById('thirdSelect').value, f = document.getElementById('fastestLapSelect').value, msg = document.getElementById('message');
        if (w === s || w === t || s === t) { msg.innerHTML = '❌ Select three different drivers!'; msg.style.color = '#ff8c00'; setTimeout(() => msg.innerHTML = '', 2000); return; }
        predictions.unshift({ race: "Miami GP", date: new Date().toLocaleDateString(), winner: w, second: s, third: t, fastestLap: f });
        if (predictions.length > 5) predictions.pop();
        localStorage.setItem('f1Predictions', JSON.stringify(predictions));
        renderHistory();
        msg.innerHTML = '✅ Prediction saved!'; msg.style.color = '#00a65a'; setTimeout(() => msg.innerHTML = '', 2000);
    });
    
    document.addEventListener('DOMContentLoaded', () => { populateSelects(); renderHistory(); });
</script>
</body>
</html>
