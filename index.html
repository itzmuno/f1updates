<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Formula 1 | The Official Home of Racing 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Titillium+Web:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b12;
            font-family: 'Inter', 'Titillium Web', sans-serif;
            color: #ffffff;
            line-height: 1.4;
            overflow-x: hidden;
        }

        :root {
            --f1-red: #e10600;
            --f1-black: #0a0a0f;
            --f1-dark-card: #111116;
            --f1-border: #22222c;
            --f1-gray: #9e9eae;
        }

        .site-wrapper {
            max-width: 1440px;
            margin: 0 auto;
            background: var(--f1-black);
            min-height: 100vh;
        }

        .header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: #08080c;
            border-bottom: 3px solid var(--f1-red);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .f1-badge {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: white;
        }
        .f1-badge span {
            font-size: 1rem;
            font-weight: 500;
            color: var(--f1-red);
            margin-left: 2px;
        }
        .tagline {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--f1-gray);
            letter-spacing: 1px;
            border-left: 2px solid var(--f1-red);
            padding-left: 12px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--f1-red);
            border-bottom: 2px solid var(--f1-red);
        }
        .btn-outline {
            border: 1.5px solid var(--f1-red);
            padding: 0.4rem 1.2rem;
            border-radius: 4px;
            background: transparent;
            color: white;
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-outline:hover {
            background: var(--f1-red);
            color: white;
        }

        .hero {
            min-height: 55vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1541343672885-9be56236302a?w=1600&h=600&fit=crop');
            background-size: cover;
            background-position: center;
            padding: 3rem 2rem;
        }
        .hero-content h1 {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 1rem;
        }
        .hero-content .f1-highlight { color: var(--f1-red); }
        .hero-buttons {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .btn-f1-primary {
            background: var(--f1-red);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 5px;
            font-weight: 700;
            text-transform: uppercase;
            color: white;
            cursor: pointer;
        }
        .btn-f1-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid white;
            padding: 0.8rem 2rem;
            border-radius: 5px;
            font-weight: 700;
            text-transform: uppercase;
            color: white;
            cursor: pointer;
        }

        .news-ticker {
            background: #111116;
            border-bottom: 1px solid var(--f1-border);
            padding: 0.8rem 2rem;
            overflow: hidden;
            white-space: nowrap;
        }
        .ticker-content {
            display: inline-block;
            animation: ticker 35s linear infinite;
        }
        .ticker-content span { margin-right: 2rem; color: var(--f1-gray); cursor: pointer; }
        .ticker-content span:hover { color: var(--f1-red); }
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .home-section { padding: 4rem 2rem; }
        .container { max-width: 1280px; margin: 0 auto; }
        .section-header {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            border-left: 4px solid var(--f1-red);
            padding-left: 1rem;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.8rem;
        }
        .news-card {
            background: var(--f1-dark-card);
            border: 1px solid var(--f1-border);
            border-radius: 16px;
            overflow: hidden;
            transition: 0.2s;
            cursor: pointer;
        }
        .news-card:hover {
            border-color: var(--f1-red);
            transform: translateY(-4px);
        }
        .news-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .news-content { padding: 1rem; }
        .news-date { color: var(--f1-red); font-size: 0.7rem; margin-top: 0.5rem; }

        .footer {
            background: #06060a;
            padding: 1.5rem;
            text-align: center;
            font-size: 0.7rem;
        }
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 0.8rem;
        }

        @media (max-width: 800px) {
            .header { flex-direction: column; gap: 1rem; }
            .hero-content h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="site-wrapper">
    <header class="header">
        <div class="logo-area">
            <div class="f1-badge">FORMULA 1<span>®</span></div>
            <div class="tagline">OFFICIAL 2026 SEASON</div>
        </div>
        <div class="nav-links">
            <a href="index.html" class="active">HOME</a>
            <a href="drivers.html">DRIVERS</a>
            <a href="teams.html">TEAMS</a>
            <a href="calendar.html">CALENDAR</a>
            <a href="predict.html">F1 PREDICT</a>
            <a href="watch.html" class="btn-outline">WATCH F1</a>
        </div>
    </header>

    <div class="hero">
        <div class="hero-content">
            <h1>WELCOME TO <span class="f1-highlight">FORMULA 1</span></h1>
            <p>Make your predictions, compete with fans, and follow all the action.</p>
            <div class="hero-buttons">
                <a href="predict.html"><button class="btn-f1-primary">MAKE YOUR PREDICTION →</button></a>
                <a href="calendar.html"><button class="btn-f1-secondary">VIEW CALENDAR →</button></a>
            </div>
        </div>
    </div>
    <div class="news-ticker"><div class="ticker-content" id="tickerContent"></div></div>
    <div class="home-section">
        <div class="container">
            <div class="section-header"><i class="fas fa-newspaper"></i> LATEST F1 NEWS</div>
            <div class="news-grid" id="homeNewsGrid"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="social-icons">
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
        <p>© 2026 Formula One World Championship Limited. Click any news for full story.</p>
    </footer>
</div>

<script>
    // Store news data in localStorage so detail page can access it
    const newsDatabase = [
        { 
            id: 1, 
            title: "Antonelli dominates Miami Sprint Shootout", 
            summary: "Kimi Antonelli took pole position for the Miami Sprint Race, extending his championship lead.", 
            fullContent: "Kimi Antonelli continued his incredible rookie season by dominating the Miami Sprint Shootout, setting the fastest time in every segment. The 19-year-old Italian will start from pole position for Saturday's Sprint Race. 'The car is flying, and I'm loving every moment,' Antonelli said. 'Miami is electric.' With 4 consecutive pole positions, Antonelli now leads the championship with 68 points, followed by George Russell (46 points). The Sprint Race starts at 2:30 PM local time on Saturday.",
            image: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/antonelli.jpg", 
            date: "April 28, 2026", 
            category: "Breaking News" 
        },
        { 
            id: 2, 
            title: "Ferrari brings major upgrade package to Miami", 
            summary: "Scuderia Ferrari introduced a heavily revised floor and rear wing for the Miami Grand Prix.", 
            fullContent: "Ferrari has arrived in Miami with a significant upgrade package aimed at addressing the car's aerodynamic deficiencies. The new floor and rear wing are designed to increase downforce in medium-speed corners. 'We believe this is a step forward,' said team principal Fred Vasseur. 'The data from Friday practice looks promising.' Charles Leclerc and Lewis Hamilton both advanced to Q3, marking Ferrari's best qualifying result of the season.",
            image: "https://media.formula1.com/content/dam/fom-website/teams/Ferrari/ferrari-garage-2026.jpg", 
            date: "April 27, 2026", 
            category: "Tech" 
        },
        { 
            id: 3, 
            title: "Cadillac secures first Q3 appearance in home race", 
            summary: "Sergio Perez qualified 9th for the Miami Sprint Race, the team's first Q3 appearance.", 
            fullContent: "Cadillac achieved its best qualifying result since joining F1, with Sergio Perez advancing to Q3 in the Miami Sprint Shootout. The Mexican driver will start 9th for Saturday's Sprint Race. 'The crowd was unbelievable,' Perez said. 'Every lap they cheered louder. This is for every American fan.' Teammate Valtteri Bottas also had his best qualifying of the season, starting P13.",
            image: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/perez.jpg", 
            date: "April 27, 2026", 
            category: "Team News" 
        },
        { 
            id: 4, 
            title: "Norris: 'McLaren ready to fight for wins'", 
            summary: "Lando Norris believes McLaren has the pace to challenge for victories in the upcoming races.", 
            fullContent: "Lando Norris has expressed confidence in McLaren's development trajectory after a strong start to the 2026 season. 'We're not just fighting for podiums anymore,' Norris said. 'Wins are within reach. The team has done an incredible job with the car.' McLaren has scored points in every race so far, with Norris finishing on the podium in Australia.",
            image: "https://media.formula1.com/content/dam/fom-website/drivers/2025Drivers/norris.jpg", 
            date: "April 26, 2026", 
            category: "Interview" 
        }
    ];

    // Save news to localStorage for detail page
    localStorage.setItem('f1NewsData', JSON.stringify(newsDatabase));

    function renderHomeNews() {
        const container = document.getElementById('homeNewsGrid');
        if (container) {
            container.innerHTML = newsDatabase.map(news => `
                <div class="news-card" onclick="window.location.href='news-detail.html?id=${news.id}'">
                    <img class="news-image" src="${news.image}" onerror="this.src='https://placehold.co/600x400/1a1a22/e10600?text=F1+News'">
                    <div class="news-content">
                        <h3>${news.title}</h3>
                        <p>${news.summary}</p>
                        <div class="news-date">${news.date} · ${news.category}</div>
                    </div>
                </div>
            `).join('');
        }
        
        const ticker = document.getElementById('tickerContent');
        if (ticker) {
            ticker.innerHTML = newsDatabase.map(news => `<span onclick="window.location.href='news-detail.html?id=${news.id}'">🔴 ${news.title}</span>`).join('');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderHomeNews();
    });
</script>
</body>
</html>
